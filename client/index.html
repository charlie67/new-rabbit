<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>new-rabb-it</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div id="url-bar">
        <input type="text" id="url-input" placeholder="Enter URL..." spellcheck="false">
        <button id="go-btn">Go</button>
      </div>
      <button id="audio-btn" class="muted" title="Click to unmute">Unmute</button>
      <div id="connection-status">Connecting...</div>
    </header>

    <div id="main">
      <div id="viewport-container">
        <video id="viewport" autoplay muted playsinline disablePictureInPicture></video>
        <div id="input-overlay" tabindex="0"></div>
      </div>

      <aside id="sidebar">
        <div id="user-panel">
          <h3>Users</h3>
          <ul id="user-list"></ul>
        </div>

        <div id="nickname-panel">
          <input type="text" id="nickname-input" placeholder="Your name..." maxlength="20">
          <button id="nickname-btn">Set</button>
        </div>

        <div id="control-panel">
          <button id="control-btn" class="take">Take Control</button>
        </div>
      </aside>
    </div>

    <footer id="status-bar">
      <span id="controller-status">No one has control</span>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1/dist/mpegts.js"></script>
  <script src="app.js"></script>
</body>
</html>
