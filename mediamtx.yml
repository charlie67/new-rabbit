# MediaMTX — WebRTC ingest (WHIP, in-container) → WebRTC egress (WHEP, clients)

logLevel: info
logDestinations: [stdout]

# Disable unused protocols. RTSP is gone: the browser extension now publishes
# directly over WHIP to the WebRTC server below, so there's no FFmpeg/RTSP hop.
hls: no
rtmp: no
srt: no
rtsp: no
api: no
metrics: no
playback: no

# WebRTC HTTP — serves both WHIP (ingest, from the in-container extension) and
# WHEP (egress, to browser clients) on the same port.
webrtc: yes
webrtcAddress: :8889
webrtcEncryption: no
webrtcAllowOrigins: ["*"]
webrtcTrustedProxies: []

# WebRTC media transport — exposed directly (not through Caddy).
# UDP is preferred (lowest latency). TCP is also enabled so the media path works
# in environments that don't forward UDP over localhost (e.g. WSL2 in NAT mode):
# the browser falls back to the TCP candidate when the UDP one is unreachable.
webrtcLocalUDPAddress: :8189
webrtcLocalTCPAddress: :8189
webrtcIPsFromInterfaces: yes

# Public hostnames to advertise in ICE candidates.
# 127.0.0.1 lets a browser on the Docker host reach the published media port.
# For LAN/remote access add the host's LAN IP; in production override via env:
# MTX_WEBRTCADDITIONALHOSTS=room-name.domain.com
webrtcAdditionalHosts: [127.0.0.1]

# Public STUN so clients behind NAT can discover their reflexive address
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# Single path; the browser extension pushes here as a WHIP publisher
paths:
  live:
    source: publisher
